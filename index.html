<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vanshu. The Eve.</title>
    <!-- Importing a clean, modern sans-serif font (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Warm, deep palette with soft white and accent pink */
            --bg-color: #08080a; /* Deep charcoal with a touch of warm magenta */
            --text-primary: #fffcf5; /* Soft warm white */
            --text-secondary: #b8b8ba; /* Medium gray */
            --accent: #ef5b9e; /* A rich, but soft, rose/magenta pink */
            --frame-shadow: rgba(239, 91, 158, 0.3); /* Subtle accent glow */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Subtle decorative gradient blur on the whole page */
        body::before {
            content: "";
            position: absolute;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            background: linear-gradient(135deg, rgba(239, 91, 158, 0.1), rgba(255, 255, 255, 0));
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            width: 100%;
            position: relative;
        }

        /* Personalized Title (My Vanshu's Birthday Eve) */
        h1.main-title {
            font-weight: 700; /* Bolder to be more declarative */
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: 0.05em;
            text-transform: capitalize;
            color: var(--accent); /* Name title in accent color */
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(239, 91, 158, 0.5); /* Soft text-shadow for focus */
        }

        .subtitle {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            margin-bottom: 3rem;
            display: inline-block; /* For subtle decoration below */
            position: relative;
        }
        /* Subtle line under subtitle for warmth */
        .subtitle::after {
            content: "";
            position: absolute;
            bottom: -8px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 1px;
            background-color: var(--accent);
        }

        /* Countdown Grid */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3.5rem;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .time-block span.digits {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1;
            color: var(--accent); /* Digits are the accent color */
            margin-bottom: 0.5rem;
        }

        .time-block span.label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
        }

        /* Styled Frame for Her Image */
        .photo-frame-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 0 auto;
            position: relative;
        }
        .photo-frame {
            width: 100%;
            max-width: 400px;
            height: 500px;
            border: 2px solid var(--accent); /* Rose gold/pink border */
            border-radius: 6px; /* Soft round corners */
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px var(--frame-shadow); /* Soft frame glow */
            /* Using actual image provided, styled as a background for easier positioning */
            background-image: url('https://i.ibb.co/w5prR53/DSC09668.jpg');
            background-size: cover;
            background-position: center top; /* Provided portrait is oriented towards the top */
        }
        /* A subtle warm filter over the image */
        .photo-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(8, 8, 10, 0.2); /* Deepen colors */
            pointer-events: none;
        }

        /* Reveal Section (Hidden until midnight) */
        #midnight-reveal {
            display: none;
            text-align: center;
            animation: fadeIn 3s ease-in forwards; /* Slower, more epic fade-in */
        }

        /* Simpler, more intimate midnight message */
        #midnight-reveal h1 {
            font-weight: 700;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 0.05em;
            color: var(--accent);
            text-transform: capitalize;
            margin-bottom: 0.5rem;
        }
        #midnight-reveal .final-subtitle {
            color: var(--text-primary); /* Use main warm white for text */
            font-size: 1.2rem;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }
        #midnight-reveal .extra-message {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Utility for blurring out elements when midnight hits */
        .fade-out {
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <h1 class="main-title" id="main-title">My Vanshu's Birthday Eve</h1>
        <p class="subtitle" id="sub-title">Our sweet anticipation, for your beautiful day.</p>

        <div class="countdown" id="countdown">
            <div class="time-block">
                <span class="digits" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-block">
                <span class="digits" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-block">
                <span class="digits" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <div class="photo-frame-container">
            <div class="photo-frame" id="photo-frame">
                <!-- Her image is integrated via CSS background for styling -->
            </div>
        </div>

        <div id="midnight-reveal">
            <h1>Dearest Vanshu,</h1>
            <p class="final-subtitle">Today is all about you. Happy Birthday.</p>
            <p class="extra-message">I adore you.</p>
        </div>
    </div>

    <script>
        // Set the exact date and time of her birthday: June 20th, 2026 at 00:00:00
        const birthdayDate = new Date('2026-06-20T00:00:00').getTime();

        const countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = birthdayDate - now;

            if (distance < 0) {
                // Midnight has arrived
                clearInterval(countdownInterval);
                
                // Hide the countdown, title, subtitle, and photo frame
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('main-title').style.display = 'none';
                document.getElementById('sub-title').style.display = 'none';
                document.getElementById('photo-frame').style.display = 'none';
                
                // Show the romantic birthday message
                document.getElementById('midnight-reveal').style.display = 'block';
                return;
            }

            // Time calculations (hours/mins/secs)
            // Days are ignored to keep focus strictly on the "eve" count down
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display results with zero-padding (e.g., 09 instead of 9)
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
            
        }, 1000);
    </script>
</body>
</html>
